<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Siguas Stickers</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}

/* PANTALLAS */
#inicio, #catalogo{
    display:none;
}

#inicio{
    display:block;
    padding:20px;
}

/* LOGO */
.logo{
    width:180px;
    margin:20px auto;
    display:block;
}

/* PORTADA */
.portada{
    width:90%;
    max-width:450px;
    border-radius:12px;
    margin-top:20px;
}

/* BOTON */
.boton{
    margin-top:25px;
    padding:15px 25px;
    font-size:18px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
}

/* VISOR */
#visor{
    display:flex;
    justify-content:center;
    align-items:center;
    height:80vh;
}

#revista{
    width:95%;
    max-height:100%;
    border-radius:10px;
    object-fit:contain;
}

/* CONTROLES */
.controles{
    margin:10px;
}

button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
}

</style>
</head>

<body>

<!-- ================== INICIO ================== -->
<div id="inicio">

    <img src="logo.sigua.png" class="logo">

    <h1>Siguas Stickers</h1>
    <p>Catálogo digital</p>

    <img src="1.jpg" class="portada">

    <br>
    <button class="boton" onclick="abrirCatalogo()">VER CATÁLOGO</button>

</div>

<!-- ================== CATALOGO ================== -->
<div id="catalogo">

    <div id="visor">
        <img id="revista" src="1.jpg">
    </div>

    <div class="controles">
        <button onclick="anterior()">⟵</button>
        <button onclick="siguiente()">⟶</button>
    </div>

    <button onclick="volver()">Volver</button>

</div>

<script>

const paginas = [
 "1.jpg",
 "2.jpg",
 "3.jpg",
 "4.jpg",
 "5.jpg",
 "6.jpg"
];

let paginaActual = 0;

/* ABRIR CATALOGO */
function abrirCatalogo(){
    document.getElementById("inicio").style.display="none";
    document.getElementById("catalogo").style.display="block";
}

/* VOLVER */
function volver(){
    document.getElementById("catalogo").style.display="none";
    document.getElementById("inicio").style.display="block";
}

/* MOSTRAR PAGINA */
function mostrarPagina(){
    document.getElementById("revista").src = paginas[paginaActual];
}

/* BOTONES */
function siguiente(){
    if(paginaActual < paginas.length-1){
        paginaActual++;
        mostrarPagina();
    }
}

function anterior(){
    if(paginaActual > 0){
        paginaActual--;
        mostrarPagina();
    }
}

/* DESLIZAR */
let startX=0;

document.getElementById("visor").addEventListener("touchstart", function(e){
    startX = e.touches[0].clientX;
});

document.getElementById("visor").addEventListener("touchend", function(e){
    let endX = e.changedTouches[0].clientX;

    if(startX > endX+50){
        siguiente();
    }

    if(startX < endX-50){
        anterior();
    }
});

</script>

</body>
</html>
