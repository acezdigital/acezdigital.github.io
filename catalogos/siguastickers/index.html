<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigua Stickers</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0f172a;
    overflow:hidden;
    overscroll-behavior:none;
}

/* HEADER */
.header{
    position:fixed;
    top:0;
    width:100%;
    background:#2f2f2f;
    padding:12px 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid yellow;
    z-index:1000;
}
.header-text{
    color:white;
    font-size:14px;
}
.header-text b{
    font-size:17px;
}
.whatsapp-btn{
    background:#25D366;
    padding:8px 14px;
    border-radius:20px;
    text-decoration:none;
    color:white;
    margin-right:12px;
    margin-left:6px;
}

/* FOOTER */
.footer{
    position:fixed;
    bottom:0;
    width:100%;
    background:#2f2f2f;
    padding:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-top:2px solid yellow;
    color:white;
    gap:20px;
}
.footer img{
    height:46px;
}

/* VISOR */
#visor{
    position:absolute;
    top:70px;
    bottom:70px;
    left:0;
    right:0;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    touch-action:pan-x; /* SOLO horizontal */
}

/* IMAGEN */
#revista{
    width:96%;
    max-width:460px;
    border-radius:12px;
    user-select:none;
    -webkit-user-drag:none;
    pointer-events:none;
}

/* INDICADOR */
#indicador{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.6);
    color:#fff;
    padding:4px 10px;
    border-radius:10px;
    font-size:13px;
}

/* FLECHAS */
#flecha-izq, #flecha-der{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:30px;
    color:white;
    background:rgba(0,0,0,0.4);
    padding:8px 12px;
    border-radius:50%;
    cursor:pointer;
    user-select:none;
}
#flecha-izq{ left:10px; }
#flecha-der{ right:10px; }

/* TEXTO FLOTANTE */
#ayuda-swipe{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    background:rgba(0,0,0,0.7);
    color:#fff;
    padding:10px 14px;
    border-radius:10px;
    font-size:14px;
    text-align:center;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.4s ease;
}
#ayuda-swipe.mostrar{
    opacity:1;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-text">
        <b>SIGUA STICKERS</b><br>
        Nuestra calidad es tu garantía
    </div>
    <a href="https://wa.me/50496850561" class="whatsapp-btn">WhatsApp</a>
</div>

<!-- VISOR -->
<div id="visor">
    <img id="revista" src="1Cel.webp">

    <div id="indicador">1 / 6</div>

    <div id="flecha-izq">&#10094;</div>
    <div id="flecha-der">&#10095;</div>

    <div id="ayuda-swipe">Desliza hacia la izquierda o derecha</div>
</div>

<!-- FOOTER -->
<div class="footer">
    <img src="ACEZdigital.png">
    <div>Catálogo diseñado por ACEZ Digital</div>
    <a href="https://wa.me/50433661836" class="whatsapp-btn">WhatsApp</a>
</div>

<script>

/* BLOQUEOS BASICOS */
document.addEventListener("contextmenu", e => e.preventDefault());
if(window.top !== window.self){
    window.top.location = window.self.location;
}

/* PAGINAS */
const paginas = ["1Cel.webp","2Cel.webp","3Cel.webp","4Cel.webp","5Cel.webp","6Cel.webp"];
let paginaActual = 0;

/* PRECARGA */
paginas.forEach(src=>{
    const img = new Image();
    img.src = src;
});

/* MOSTRAR */
function mostrar(){
    document.getElementById("revista").src = paginas[paginaActual];
    document.getElementById("indicador").innerText = (paginaActual+1)+" / "+paginas.length;

    const izq = document.getElementById("flecha-izq");
    const der = document.getElementById("flecha-der");

    // CONTROL DE FLECHAS
    if(paginaActual === 0){
        izq.style.display = "none";
        der.style.display = "block";
        mostrarAyuda();
    }
    else if(paginaActual === paginas.length - 1){
        izq.style.display = "block";
        der.style.display = "none";
    }
    else{
        izq.style.display = "block";
        der.style.display = "block";
    }
}

/* SWIPE */
let startX = 0;
let startY = 0;
const visor = document.getElementById("visor");

visor.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;

    if(paginaActual === 0){
        mostrarAyuda();
    }
});

visor.addEventListener("touchmove", function(e){
    let deltaY = Math.abs(e.touches[0].clientY - startY);
    if(deltaY > 10){
        e.preventDefault();
    }
}, { passive:false });

visor.addEventListener("touchend", e=>{
    let endX = e.changedTouches[0].clientX;

    if(startX > endX + 30){
        if(paginaActual < paginas.length - 1){
            paginaActual++;
            mostrar();
        }
    }

    if(startX < endX - 30){
        if(paginaActual > 0){
            paginaActual--;
            mostrar();
        }
    }
});

/* FLECHAS */
document.getElementById("flecha-der").onclick = ()=>{
    if(paginaActual < paginas.length - 1){
        paginaActual++;
        mostrar();
    }
};
document.getElementById("flecha-izq").onclick = ()=>{
    if(paginaActual > 0){
        paginaActual--;
        mostrar();
    }
};

/* AYUDA */
const ayuda = document.getElementById("ayuda-swipe");
let timerAyuda = null;

function mostrarAyuda(){
    ayuda.classList.add("mostrar");
    clearTimeout(timerAyuda);
    timerAyuda = setTimeout(()=>{
        ayuda.classList.remove("mostrar");
    }, 2500);
}

/* INICIAR */
mostrar();

</script>

</body>
</html>
