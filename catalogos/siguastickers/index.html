<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigua Stickers</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:white;
    overflow:hidden;
}

/* PANTALLAS */
#inicio, #catalogo{
    height:100vh;
    display:none;
}

#inicio{
    display:flex;
    justify-content:center;
    align-items:center;
}

/* HEADER */
.header{
    position:fixed;
    top:0;
    width:100%;
    background:#2f2f2f;
    padding:12px 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid yellow;
    z-index:1000;
}

.header-text{
    text-align:left;
    font-size:14px;
}

.header-text b{
    font-size:18px;
}

.whatsapp-btn{
    background:#25D366;
    padding:8px 14px;
    border-radius:20px;
    text-decoration:none;
    color:white;
    font-size:13px;
    margin-right:40px;
}

/* FOOTER */
.footer{
    position:fixed;
    bottom:0;
    width:100%;
    background:#2f2f2f;
    padding:12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-top:2px solid yellow;
    font-size:13px;
}

.footer img{
    height:46px;
    margin-left:10px;
}

.footer-text{
    flex:1;
    padding:0 10px;
}

.footer a{
    background:#25D366;
    padding:8px 14px;
    border-radius:20px;
    text-decoration:none;
    color:white;
    font-size:13px;
    margin-right:18px;
}

/* CONTENIDO CENTRAL */
.contenido{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding-top:100px;
    padding-bottom:100px;
}

/* PORTADA FIJA */
.portada{
    width:90%;
    max-width:380px;
    border-radius:12px;
}

/* BOTÓN REAL */
.boton{
    position:absolute;
    bottom:8%;
    left:50%;
    transform:translateX(-50%);
    background:#16a34a;
    color:white;
    border:none;
    border-radius:25px;
    padding:14px 26px;
    font-size:17px;
}

/* WRAP */
.portada-wrap{
    position:relative;
}

/* ===== CATALOGO ===== */

#catalogo{
    display:none;
    flex-direction:column;
    justify-content:flex-start;
    align-items:center;
    padding-top:90px;
    padding-bottom:90px;
}

/* VISOR */
#visor{
    width:100%;
    height:78vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

#revista{
    width:96%;
    max-width:460px;
    border-radius:12px;
    object-fit:contain;
}

/* BOTÓN VOLVER */
.volver-btn{
    margin-top:6px;
    padding:9px 18px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-text">
        <b>SIGUA STICKERS</b><br>
        Nuestra calidad es tu garantía
    </div>
    <a href="https://wa.me/50496850561" class="whatsapp-btn">WhatsApp</a>
</div>

<!-- FOOTER -->
<div class="footer">
    <img src="ACEZdigital.png">
    <div class="footer-text">
        28-2-26/ Catálogo diseñado por ACEZ Digital
    </div>
    <a href="https://wa.me/50433661836">WhatsApp</a>
</div>

<!-- ===== INICIO FIJO ===== -->
<div id="inicio" class="contenido">

    <div class="portada-wrap">
        <img src="1.jpg" class="portada">

        <button class="boton" onclick="abrirCatalogo()">
            Ver catálogo
        </button>
    </div>

</div>

<!-- ===== CATALOGO ===== -->
<div id="catalogo" class="contenido">

    <div id="visor">
        <img id="revista" src="1.jpg">
    </div>

    <button class="volver-btn" onclick="volver()">Volver</button>

</div>

<script>

const paginas = ["1.jpg","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg"];
let paginaActual = 0;

/* ABRIR */
function abrirCatalogo(){
    document.getElementById("inicio").style.display="none";
    document.getElementById("catalogo").style.display="flex";
}

/* VOLVER */
function volver(){
    document.getElementById("catalogo").style.display="none";
    document.getElementById("inicio").style.display="flex";
}

/* MOSTRAR */
function mostrar(){
    document.getElementById("revista").src = paginas[paginaActual];
}

/* SWIPE */
let startX = 0;

document.getElementById("visor").addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
});

document.getElementById("visor").addEventListener("touchend", e=>{
    let endX = e.changedTouches[0].clientX;

    if(startX > endX + 50){
        paginaActual = (paginaActual + 1) % paginas.length;
        mostrar();
    }

    if(startX < endX - 50){
        paginaActual = (paginaActual - 1 + paginas.length) % paginas.length;
        mostrar();
    }
});

</script>

</body>
</html>
