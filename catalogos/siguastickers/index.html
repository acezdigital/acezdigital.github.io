<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigua Stickers</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}

/* PANTALLAS */
#inicio, #catalogo{
    display:none;
}
#inicio{
    display:block;
    padding:30px;
}

/* PORTADA */
.portada{
    width:90%;
    max-width:450px;
    border-radius:12px;
    margin-top:20px;
}

/* BOTON */
.boton{
    margin-top:25px;
    padding:15px 25px;
    font-size:18px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

/* REVISTA */
.revista{
    display:flex;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling: touch;
}

.revista img{
    width:100%;
    height:100vh;
    object-fit:contain;
    scroll-snap-align:center;
    flex-shrink:0;
}

/* FOOTER */
footer{
    background:#020617;
    padding:20px;
    font-size:14px;
    margin-top:20px;
}

footer a{
    color:#38bdf8;
    text-decoration:none;
    font-weight:bold;
}

</style>
</head>

<body>

<!-- INICIO -->
<section id="inicio">
    <h1>Sigua Stickers</h1>
    <p>Catálogo digital</p>

    <img src="1.jpg" class="portada">

    <br>
    <button class="boton" onclick="mostrarCatalogo()">Ver catálogo</button>
</section>

<!-- CATALOGO -->
<section id="catalogo">
    <div class="revista">
        <img src="1.jpg">
        <img src="2.jpg">
        <img src="3.jpg">
        <img src="4.jpg">
        <img src="5.jpg">
        <img src="6.jpg">
    </div>

    <!-- FOOTER COMERCIAL -->
    <footer>
        <p>¿Quieres un catálogo digital como este?</p>
        <p>Diseñado por <strong>AC Digital</strong></p>
        <p>
            📲 <a href="https://wa.me/50433661836">Escríbeme por WhatsApp</a><br>
            ☎️ <a href="tel:+50400000000">Llamar ahora</a>
        </p>
    </footer>
</section>

<script>
function mostrarCatalogo(){
    document.getElementById("inicio").style.display="none";
    document.getElementById("catalogo").style.display="block";
}
</script>

</body>
</html>
