<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigua Stickers</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0f172a;
    overflow:hidden;
}

/* HEADER */
.header{
    position:fixed;
    top:0;
    width:100%;
    background:#2f2f2f;
    padding:12px 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid yellow;
    z-index:1000;
}
.header-text{
    color:white;
    font-size:14px;
}
.header-text b{
    font-size:17px;
}
.whatsapp-btn{
    background:#25D366;
    padding:8px 14px;
    border-radius:20px;
    text-decoration:none;
    color:white;
    margin-right:18px;
}

/* FOOTER */
.footer{
    position:fixed;
    bottom:0;
    width:100%;
    background:#2f2f2f;
    padding:12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-top:2px solid yellow;
    color:white;
}
.footer img{
    height:46px;
}

/* VISOR */
#visor{
    position:absolute;
    top:70px;
    bottom:70px;
    left:0;
    right:0;
    display:flex;
    justify-content:center;
    align-items:flex-start;
}

/* IMAGEN */
#revista{
    width:96%;
    max-width:460px;
    border-radius:12px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-text">
        <b>SIGUA STICKERS</b><br>
        Nuestra calidad es tu garantía
    </div>
    <a href="https://wa.me/50496850561" class="whatsapp-btn">WhatsApp</a>
</div>

<!-- VISOR CATALOGO -->
<div id="visor">
    <img id="revista" src="1.jpg">
</div>

<!-- FOOTER -->
<div class="footer">
    <img src="ACEZdigital.png">
    <div>Catálogo diseñado por ACEZ Digital</div>
    <a href="https://wa.me/50433661836" class="whatsapp-btn">WhatsApp</a>
</div>

<script>

/* PAGINAS DEL CATALOGO */
const paginas = ["1.jpg","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg"];
let paginaActual = 0;

/* MOSTRAR */
function mostrar(){
    document.getElementById("revista").src = paginas[paginaActual];
}

/* SWIPE IZQUIERDA / DERECHA */
let startX = 0;

const visor = document.getElementById("visor");

visor.addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
});

visor.addEventListener("touchend", e=>{
    let endX = e.changedTouches[0].clientX;

    if(startX > endX + 50){
        paginaActual = (paginaActual + 1) % paginas.length;
        mostrar();
    }

    if(startX < endX - 50){
        paginaActual = (paginaActual - 1 + paginas.length) % paginas.length;
        mostrar();
    }
});

</script>

</body>
</html>
