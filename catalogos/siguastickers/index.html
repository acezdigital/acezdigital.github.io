<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigua Stickers</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
    overflow:hidden; /* sin scroll */
}

/* PANTALLAS */
#inicio, #catalogo{
    display:none;
    height:100vh;
}

#inicio{
    display:block;
}

/* ===== HEADER ===== */
.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#2f2f2f;
    padding:14px 16px; /* más alto */
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:1000;
    border-bottom:2px solid yellow;
}

.header-text b{
    font-size:18px;
}

.header-text{
    text-align:left;
    font-size:14px;
}

.whatsapp-btn{
    background:#25D366;
    color:white;
    padding:9px 16px;
    border-radius:20px;
    text-decoration:none;
    font-size:14px;
    margin-right:10px; /* hacia la derecha */
}

/* ===== FOOTER ===== */
.footer{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#2f2f2f;
    padding:10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-top:2px solid yellow;
    font-size:13px;
}

.footer img{
    height:40px; /* más grande */
    margin-left:8px;
}

.footer-text{
    flex:1;
    padding:0 10px;
}

.footer a{
    background:#25D366;
    padding:9px 16px;
    border-radius:20px;
    text-decoration:none;
    color:white;
    font-size:13px;
    margin-right:10px;
}

/* CONTENIDO CENTRAL */
.contenido{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding-top:110px;  /* espacio header */
    padding-bottom:110px; /* espacio footer */
}

/* PORTADA */
.portada{
    width:90%;
    max-width:420px;
    border-radius:12px;
}

/* BOTÓN */
.boton{
    margin-top:15px;
    padding:14px 26px;
    background:#16a34a;
    border:none;
    border-radius:10px;
    font-size:18px;
    color:white;
}

/* VISOR */
#visor{
    height:68vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

#revista{
    width:92%;
    max-width:430px;
    border-radius:12px;
    object-fit:contain;
}

/* VOLVER */
.volver-btn{
    margin-top:6px;
    padding:8px 18px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-text">
        <b>SIGUA STICKERS</b><br>
        Nuestra calidad es tu garantía
    </div>
    <a href="https://wa.me/50496850561" class="whatsapp-btn">WhatsApp</a>
</div>

<!-- FOOTER -->
<div class="footer">
    <img src="ACEZETA.digital.png">
    <div class="footer-text">
        Catálogo diseñado por ACEZETA Digital
    </div>
    <a href="https://wa.me/50496850561">WhatsApp</a>
</div>

<!-- INICIO FIJO -->
<div id="inicio" class="contenido">
    <img src="1.jpg" class="portada">
    <button class="boton" onclick="abrirCatalogo()">Ver catálogo</button>
</div>

<!-- CATÁLOGO -->
<div id="catalogo" class="contenido">
    <div id="visor">
        <img id="revista" src="1.jpg">
    </div>
    <button class="volver-btn" onclick="volver()">Volver</button>
</div>

<script>

const paginas = [
 "1.jpg",
 "2.jpg",
 "3.jpg",
 "4.jpg",
 "5.jpg",
 "6.jpg"
];

let paginaActual = 0;
let auto = null;

/* ABRIR */
function abrirCatalogo(){
    document.getElementById("inicio").style.display="none";
    document.getElementById("catalogo").style.display="block";
    iniciarAuto();
}

/* VOLVER */
function volver(){
    document.getElementById("catalogo").style.display="none";
    document.getElementById("inicio").style.display="block";
    detenerAuto();
}

/* MOSTRAR */
function mostrar(){
    document.getElementById("revista").src = paginas[paginaActual];
}

/* SIGUIENTE */
function siguiente(){
    paginaActual=(paginaActual+1)%paginas.length;
    mostrar();
}

/* AUTO */
function iniciarAuto(){
    auto=setInterval(()=>{siguiente();},3000);
}

function detenerAuto(){
    clearInterval(auto);
}

/* SWIPE IZQ-DER */
let startX=0;

document.getElementById("visor").addEventListener("touchstart",e=>{
    startX=e.touches[0].clientX;
    detenerAuto();
});

document.getElementById("visor").addEventListener("touchend",e=>{
    let endX=e.changedTouches[0].clientX;

    if(startX > endX+50){
        siguiente();
    }
    if(startX < endX-50){
        paginaActual=(paginaActual-1+paginas.length)%paginas.length;
        mostrar();
    }

    iniciarAuto();
});

</script>

</body>
</html>
