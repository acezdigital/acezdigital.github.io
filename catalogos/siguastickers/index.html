<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigua Stickers</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
    overflow:hidden;
}

/* PANTALLAS */
#inicio, #catalogo{
    display:none;
    height:100vh;
}
#inicio{ display:block; }

/* HEADER */
.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#2f2f2f;
    padding:14px 12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid yellow;
    z-index:1000;
}

.header-text{
    text-align:left;
    font-size:14px;
    margin-left:4px;
}

.header-text b{
    font-size:18px;
}

.whatsapp-btn{
    background:#25D366;
    color:white;
    padding:9px 16px;
    border-radius:20px;
    text-decoration:none;
    font-size:14px;
    margin-right:0px; /* más hacia la izquierda */
}

/* FOOTER */
.footer{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#2f2f2f;
    padding:10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-top:2px solid yellow;
    font-size:13px;
}

.footer img{
    height:42px;
    margin-left:10px;
}

.footer-text{
    flex:1;
    padding:0 8px;
}

.footer a{
    background:#25D366;
    padding:9px 16px;
    border-radius:20px;
    text-decoration:none;
    color:white;
    font-size:13px;
    margin-right:0px; /* más hacia la izquierda */
}

/* CONTENIDO */
.contenido{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding-top:120px;
    padding-bottom:120px;
}

/* PORTADA */
.portada-wrap{
    position:relative;
    width:100%;
    max-width:420px;
}

.portada{
    width:100%;
    border-radius:12px;
}

/* BOTÓN EXACTO ENCIMA DEL BOTÓN ROJO */
.boton-overlay{
    position:absolute;
    bottom:6%;      /* MÁS ABAJO */
    left:50%;
    transform:translateX(-50%);
    width:70%;      /* ancho similar al botón rojo */
    height:60px;    /* altura del botón rojo */
    background:transparent; /* invisible encima */
    border:none;
}

/* VISOR */
#visor{
    height:64vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

#revista{
    width:94%;
    max-width:440px;
    border-radius:12px;
    object-fit:contain;
}

/* VOLVER */
.volver-btn{
    margin-top:8px;
    padding:9px 18px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:14px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-text">
        <b>SIGUA STICKERS</b><br>
        Nuestra calidad es tu garantía
    </div>
    <a href="https://wa.me/50496850561" class="whatsapp-btn">WhatsApp</a>
</div>

<!-- FOOTER -->
<div class="footer">
    <img src="ACEZdigital.png">
    <div class="footer-text">
        Catálogo diseñado por ACEZ Digital
    </div>
    <a href="https://wa.me/50433661836">WhatsApp</a>
</div>

<!-- INICIO -->
<div id="inicio" class="contenido">

    <div class="portada-wrap">
        <img src="1.jpg" class="portada">

        <!-- BOTÓN FUNCIONAL SOBRE EL BOTÓN ROJO -->
        <button class="boton-overlay" onclick="abrirCatalogo()"></button>
    </div>

</div>

<!-- CATÁLOGO -->
<div id="catalogo" class="contenido">

    <div id="visor">
        <img id="revista" src="1.jpg">
    </div>

    <button class="volver-btn" onclick="volver()">Volver</button>

</div>

<script>

const paginas = ["1.jpg","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg"];

let paginaActual = 0;
let auto = null;

function abrirCatalogo(){
    document.getElementById("inicio").style.display="none";
    document.getElementById("catalogo").style.display="block";
    iniciarAuto();
}

function volver(){
    document.getElementById("catalogo").style.display="none";
    document.getElementById("inicio").style.display="block";
    detenerAuto();
}

function mostrar(){
    document.getElementById("revista").src = paginas[paginaActual];
}

function siguiente(){
    paginaActual = (paginaActual + 1) % paginas.length;
    mostrar();
}

function iniciarAuto(){
    auto = setInterval(()=>{ siguiente(); }, 3000);
}

function detenerAuto(){
    clearInterval(auto);
}

/* SWIPE */
let startX = 0;

document.getElementById("visor").addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
    detenerAuto();
});

document.getElementById("visor").addEventListener("touchend", e=>{
    let endX = e.changedTouches[0].clientX;

    if(startX > endX + 50) siguiente();

    if(startX < endX - 50){
        paginaActual = (paginaActual - 1 + paginas.length) % paginas.length;
        mostrar();
    }

    iniciarAuto();
});

</script>

</body>
</html>
