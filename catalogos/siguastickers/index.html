<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Sigua Stickers</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}

header{
    padding:20px;
    background:#020617;
}

header img{
    height:50px;
    vertical-align:middle;
}

h1{
    margin:10px 0;
}

#visor{
    display:flex;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    width:100%;
    height:90vh;
}

.page{
    flex:0 0 100%;
    scroll-snap-align:center;
    display:flex;
    justify-content:center;
    align-items:center;
}

.page img{
    max-width:95%;
    max-height:95%;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
}
</style>

</head>

<body>

<header>
    <img src="../logo.png">
    <h1>Sigua Stickers</h1>
    <p>Catálogo digital</p>
</header>

<div id="visor">

    <div class="page"><img src="1.jpg"></div>
    <div class="page"><img src="2.jpg"></div>
    <div class="page"><img src="3.jpg"></div>
    <div class="page"><img src="4.jpg"></div>
    <div class="page"><img src="5.jpg"></div>

</div>

</body>
</html>
