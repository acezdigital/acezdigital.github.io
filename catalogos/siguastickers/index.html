<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* GENERAL */
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}
/* NO SELECCIONAR TEXTO */
h1, h2, h3, p{
    user-select:none;
}
/* HEADER FIJO */
header{
    position:fixed;
    top:0;
    width:100%;
    background:#020617;
    padding:15px;
    font-size:22px;
    font-weight:bold;
    z-index:1000;
}
/* ESPACIO PARA HEADER */
main{
    padding-top:80px;
}
/* SECCIONES */
#inicio, #catalogo{
    display:none;
}
#inicio{
    display:block;
    padding:30px;
}
/* PORTADA */
.portada{
    width:90%;
    max-width:450px;
    border-radius:12px;
    margin-top:20px;
}
/* BOTONES */
.boton{
    margin-top:20px;
    padding:15px 25px;
    font-size:18px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
/* REVISTA */
.revista{
    display:flex;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling: touch;
}
.revista img{
    width:100%;
    height:100vh;
    object-fit:contain;
    scroll-snap-align:center;
    flex-shrink:0;
}
/* BLOQUE AC DIGITAL */
.acdigital{
    background:#020617;
    padding:15px;
    margin-top:20px;
    border-radius:10px;
}
/* FOOTER */
footer{
    background:#020617;
    padding:20px;
    font-size:14px;
    margin-top:20px;
}

/* BOTON WHATSAPP FLOTANTE */
.whatsapp{
    position:fixed;
    bottom:15px;
    right:15px;
    background:#25D366;
    color:white;
    padding:15px 18px;
    border-radius:50px;
    font-size:18px;
    text-decoration:none;
    z-index:1000;
}
</style>
</head>
<body>
<header>SIGUA STICKERS</header>
<main>
<!-- INICIO -->
<section id="inicio">
    <h1>SIGUA STICKERS</h1>
    <p>Catálogo digital</p>
    <img src="1.jpg" class="portada">
    <br>
    <button class="boton" onclick="mostrarCatalogo()">Ver catálogo</button>
    <!-- BLOQUE AC DIGITAL ARRIBA -->
    <div class="acdigital">
        <p>¿Quieres un catálogo digital como este?</p>
        <p><strong>AC Digital</strong> lo diseña para tu negocio</p>
        <a class="boton" href="https://wa.me/50433661836">Solicitar catálogo</a>
    </div>
</section>
<!-- CATALOGO -->
<section id="catalogo">

    <!-- BOTON CONTACTO -->
    <a class="boton" href="https://wa.me/50496850561">Contactar A Sigua Stickers</a>

    <div class="revista">
        <img src="1.jpg">
        <img src="2.jpg">
        <img src="3.jpg">
        <img src="4.jpg">
        <img src="5.jpg">
        <img src="6.jpg">
    </div>

    <!-- FOOTER -->
    <footer>
        <p>Diseñado por <strong>ACEZ Digital</strong></p>
        <p>
            📲 <a href="https://wa.me/50400000000">Crear mi catálogo</a>
        </p>
    </footer>

</section>
</main>
<!-- BOTON WHATSAPP SIEMPRE VISIBLE -->
<a class="whatsapp" href="https://wa.me/50496850561">WhatsApp</a>
<script>
function mostrarCatalogo(){
    document.getElementById("inicio").style.display="none";
    document.getElementById("catalogo").style.display="block";
}
</script>
</body>
</html>
