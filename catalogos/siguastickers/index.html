<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACES Digital</title>

  <style>
    /* ====== RESET ====== */
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden; /* SIN scroll vertical */
      background:#0f2027;
      color:#fff;
    }

    /* ====== CONTENEDOR HORIZONTAL ====== */
    .wrapper{
      display:flex;
      flex-direction:row;
      width:100vw;
      height:100vh;
      overflow-x:scroll;
      overflow-y:hidden;
      scroll-snap-type:x mandatory;
      scroll-behavior:smooth;
    }

    /* ====== CADA PÁGINA ====== */
    .page{
      min-width:100vw;
      height:100vh;
      scroll-snap-align:start;
      padding:60px 18px 18px 18px; /* espacio superior para header */
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      position:relative;
    }

    /* ====== FONDOS ====== */
    .home{
      background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
    }

    .catalogo{
      background:linear-gradient(120deg,#1e3c72,#2a5298);
    }

    /* ====== HEADER FIJO ====== */
    .brand-bar{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:6px 12px;
      background:rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      font-size:12.5px;
      z-index:1000;
    }

    .brand-left{
      display:flex;
      align-items:center;
      gap:6px;
    }

    .brand-logo{
      width:26px;
      height:26px;
      object-fit:contain;
    }

    .brand-name{
      font-weight:600;
      letter-spacing:.4px;
    }

    .brand-right{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:12px;
    }

    .phone{
      opacity:.8;
    }

    /* ====== WHATSAPP FLOTANTE ARRIBA ====== */
    .whatsapp-top{
      position:fixed;
      top:8px;
      right:12px;
      background:#25D366;
      color:#fff;
      padding:6px 10px;
      border-radius:20px;
      font-size:12px;
      text-decoration:none;
      font-weight:600;
      box-shadow:0 2px 6px rgba(0,0,0,.25);
      z-index:1100;
    }

    /* ====== CONTENIDO ====== */
    .center{
      text-align:center;
      padding:6px 0;
    }

    h1{
      font-size:22px;
      margin:6px 0;
    }

    h2{
      font-size:18px;
      margin:4px 0;
    }

    p{
      font-size:13px;
      opacity:.9;
    }

    /* ====== BOTONES ====== */
    .btn{
      padding:9px 14px;
      font-size:13px;
      border:none;
      border-radius:8px;
      background:#ffffff;
      color:#000;
      cursor:pointer;
      font-weight:600;
    }

    .btn.alt{
      background:rgba(255,255,255,.2);
      color:#fff;
    }

    .bottom{
      display:flex;
      justify-content:center;
      gap:10px;
    }

    /* ====== GRID CATÁLOGO ====== */
    .cards{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:8px;
      margin-top:10px;
    }

    .card{
      padding:10px;
      border-radius:10px;
      background:rgba(255,255,255,0.12);
      text-align:center;
      font-size:13px;
      backdrop-filter: blur(4px);
    }

    /* ====== INDICADOR DE PÁGINAS ====== */
    .dots{
      position:fixed;
      bottom:8px;
      width:100%;
      text-align:center;
      font-size:18px;
      opacity:.6;
    }
  </style>
</head>

<body>

  <!-- ===== HEADER ===== -->
  <div class="brand-bar">
    <div class="brand-left">
      <img src="assets/img/AcesDigital.png" class="brand-logo">
      <span class="brand-name">ACES Digital</span>
    </div>
    <div class="brand-right">
      <span class="phone">+504 3366-1836</span>
    </div>
  </div>

  <!-- ===== WHATSAPP ===== -->
  <a href="https://wa.me/50433661836" class="whatsapp-top" target="_blank">
    WhatsApp
  </a>

  <!-- ===== CONTENEDOR ===== -->
  <div class="wrapper" id="wrapper">

    <!-- ===== PÁGINA 1 ===== -->
    <section class="page home">
      <div class="center">
        <h1>Impulsamos tu negocio en línea</h1>
        <p>Diseño • Publicidad • Branding • Marketing</p>
      </div>

      <div class="bottom">
        <button class="btn" onclick="irPagina(1)">Ver Catálogo</button>
      </div>
    </section>

    <!-- ===== PÁGINA 2 ===== -->
    <section class="page catalogo">
      <div>
        <h2>Catálogo de Servicios</h2>

        <div class="cards">
          <div class="card">Diseño gráfico</div>
          <div class="card">Publicidad digital</div>
          <div class="card">Edición de video</div>
          <div class="card">Branding</div>
          <div class="card">Impresiones</div>
          <div class="card">Redes sociales</div>
        </div>
      </div>

      <div class="bottom">
        <button class="btn alt" onclick="irPagina(0)">Volver</button>
        <button class="btn">Solicitar servicio</button>
      </div>
    </section>

  </div>

  <!-- ===== INDICADOR ===== -->
  <div class="dots">● ○</div>

  <!-- ===== SCRIPT ===== -->
  <script>
    function irPagina(index){
      const wrapper = document.getElementById("wrapper");
      const width = window.innerWidth;
      wrapper.scrollTo({
        left: width * index,
        behavior: "smooth"
      });
    }
  </script>

</body>
</html>
