<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Siguas Stickers - Catálogo</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}

/* HEADER */
header{
    padding:15px;
    background:#020617;
}

.logo{
    height:80px;
    margin-bottom:10px;
}

/* VISOR */
#visor{
    display:flex;
    justify-content:center;
    align-items:center;
    height:78vh;
}

#revista{
    width:95%;
    max-height:100%;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,0.6);
    object-fit:contain;
}

/* BOTONES */
.controles{
    margin:10px;
}

button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
}
</style>
</head>

<body>

<header>
    <img src="logo.sigua.png" class="logo">
    <h1>Siguas Stickers</h1>
    <p>Catálogo digital</p>
</header>

<div id="visor">
    <img id="revista" src="1.jpg">
</div>

<div class="controles">
    <button onclick="anterior()">⟵</button>
    <button onclick="siguiente()">⟶</button>
</div>

<script>

const paginas = [
 "1.jpg",
 "2.jpg",
 "3.jpg",
 "4.jpg",
 "5.jpg",
 "6.jpg"
];

let paginaActual = 0;

function mostrarPagina(){
    document.getElementById("revista").src = paginas[paginaActual];
}

function siguiente(){
    if(paginaActual < paginas.length - 1){
        paginaActual++;
        mostrarPagina();
    }
}

function anterior(){
    if(paginaActual > 0){
        paginaActual--;
        mostrarPagina();
    }
}

/* DESLIZAR CON EL DEDO */
let startX = 0;

document.getElementById("visor").addEventListener("touchstart", function(e){
    startX = e.touches[0].clientX;
});

document.getElementById("visor").addEventListener("touchend", function(e){
    let endX = e.changedTouches[0].clientX;

    if(startX > endX + 50){
        siguiente();
    }

    if(startX < endX - 50){
        anterior();
    }
});

</script>

</body>
</html>
