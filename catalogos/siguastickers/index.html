<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigua Stickers</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}

/* PANTALLAS */
#inicio, #catalogo{
    display:none;
}

#inicio{
    display:block;
}

/* ===== HEADER ===== */
.header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#2f2f2f;
    padding:10px 12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:13px;
    z-index:1000;
    border-bottom:2px solid yellow;
}

.header-text b{
    font-size:16px;
}

.whatsapp-btn{
    background:#25D366;
    color:white;
    padding:7px 12px;
    border-radius:20px;
    text-decoration:none;
    font-size:13px;
}

/* ===== FOOTER ===== */
.footer{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#2f2f2f;
    padding:8px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-top:2px solid yellow;
    font-size:12px;
}

.footer img{
    height:30px;
}

.footer-text{
    flex:1;
    padding:0 8px;
}

.footer a{
    background:#25D366;
    padding:7px 12px;
    border-radius:20px;
    text-decoration:none;
    color:white;
    font-size:12px;
}

/* ===== CONTENIDO ===== */
.contenido{
    padding-top:85px;
    padding-bottom:85px;
}

/* ===== PORTADA INICIAL ===== */
.portada{
    width:85%;
    max-width:380px;
    border-radius:12px;
    margin:auto;
    display:block;
}

.boton{
    margin-top:18px;
    padding:12px 24px;
    background:#16a34a;
    border:none;
    border-radius:10px;
    font-size:16px;
    color:white;
}

/* ===== VISOR REVISTA ===== */
#visor{
    height:62vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* IMAGEN CENTRAL */
#revista{
    width:85%;
    max-width:380px;
    max-height:100%;
    border-radius:12px;
    object-fit:contain;
    transition:opacity .4s;
}

/* BOTON VOLVER */
.volver-btn{
    margin-top:6px;
    padding:8px 15px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
}

/* SWIPE AREA */
#visor{
    touch-action: pan-y;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-text">
        <b>SIGUA STICKERS</b><br>
        Nuestra calidad es tu garantía
    </div>

    <a href="https://wa.me/50496850561" class="whatsapp-btn">WhatsApp</a>
</div>

<!-- FOOTER -->
<div class="footer">
    <img src="logoacez.png">
    <div class="footer-text">
        Catálogo diseñado por ACEZ Digital
    </div>
    <a href="https://wa.me/50433661836">WhatsApp</a>
</div>

<!-- ===== INICIO ===== -->
<div id="inicio" class="contenido">

    <img src="1.jpg" class="portada">

    <br>
    <button class="boton" onclick="abrirCatalogo()">Ver catálogo</button>

</div>

<!-- ===== CATALOGO ===== -->
<div id="catalogo" class="contenido">

    <div id="visor">
        <img id="revista" src="1.jpg">
    </div>

    <button class="volver-btn" onclick="volver()">Volver</button>

</div>

<script>

const paginas = [
 "1.jpg",
 "2.jpg",
 "3.jpg",
 "4.jpg",
 "5.jpg",
 "6.jpg"
];

let paginaActual = 0;
let auto = null;

/* ABRIR */
function abrirCatalogo(){
    document.getElementById("inicio").style.display="none";
    document.getElementById("catalogo").style.display="block";
    iniciarAuto();
}

/* VOLVER */
function volver(){
    document.getElementById("catalogo").style.display="none";
    document.getElementById("inicio").style.display="block";
    detenerAuto();
}

/* MOSTRAR */
function mostrar(){
    let img=document.getElementById("revista");
    img.style.opacity=0;
    setTimeout(()=>{
        img.src=paginas[paginaActual];
        img.style.opacity=1;
    },200);
}

/* SIGUIENTE AUTOMÁTICO */
function siguiente(){
    paginaActual=(paginaActual+1)%paginas.length;
    mostrar();
}

/* AUTO */
function iniciarAuto(){
    auto=setInterval(()=>{siguiente();},3000);
}

function detenerAuto(){
    clearInterval(auto);
}

/* SWIPE */
let startX=0;

document.getElementById("visor").addEventListener("touchstart",e=>{
    startX=e.touches[0].clientX;
    detenerAuto();
});

document.getElementById("visor").addEventListener("touchend",e=>{
    let endX=e.changedTouches[0].clientX;

    if(startX>endX+50) siguiente();
    if(startX<endX-50){
        paginaActual=(paginaActual-1+paginas.length)%paginas.length;
        mostrar();
    }

    iniciarAuto();
});

</script>

</body>
</html>
