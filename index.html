<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ACEZ Digital</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">

<!-- PRECARGA DEL FONDO -->
<link rel="preload" as="image" href="FondoWebACEZ.webp">

<style>

html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial, Helvetica, sans-serif;
}

/* FONDO */

body{
background:#0b1c2c;
background-image:url("FondoWebACEZ.webp");
background-position:center;
background-size:cover;
background-repeat:no-repeat;

opacity:0;
animation:entrada 0.6s ease forwards;
}

/* ANIMACIÓN DE ENTRADA */

@keyframes entrada{

from{
opacity:0;
}

to{
opacity:1;
}

}

/* ZONAS CLICABLES */

.link{
position:absolute;
display:block;
cursor:pointer;
transition:transform 0.35s ease, filter 0.35s ease;
}

.link:hover{
transform:scale(1.03);
filter:brightness(1.08);
}

.link:active{
transform:scale(0.97);
}

/* WHATSAPP */

.whatsapp{
top:2%;
right:6%;
width:28%;
height:8%;
}

/* VER CATÁLOGOS */

.catalogo{
top:26%;
left:6%;
width:36%;
height:12%;
}

/* CORREO */

.correo{
bottom:4%;
right:6%;
width:28%;
height:8%;
}

/* PANEL CATÁLOGOS */

#panelCatalogos{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(11,28,44,0.96);

display:flex;
flex-direction:column;

opacity:0;
visibility:hidden;

transition:opacity .4s ease;

z-index:9999;

}

/* PANEL ACTIVO */

#panelCatalogos.activo{
opacity:1;
visibility:visible;
}

/* BOTÓN CERRAR */

.cerrar{
position:absolute;
top:20px;
right:25px;
font-size:32px;
color:white;
cursor:pointer;
}

/* TÍTULO */

.tituloCatalogos{
color:white;
text-align:center;
margin-top:40px;
font-size:28px;
}

/* CONTENEDOR NETFLIX */

.catalogos{

display:flex;

gap:25px;

overflow-x:auto;

padding:40px;

margin-top:20px;

scroll-behavior:smooth;

}

/* OCULTAR SCROLL */

.catalogos::-webkit-scrollbar{
display:none;
}

/* TARJETAS */

.catalogo-card{

min-width:220px;

text-decoration:none;

color:white;

transition:transform .35s ease;

}

.catalogo-card img{

width:100%;

border-radius:10px;

box-shadow:0 10px 20px rgba(0,0,0,0.5);

}

.catalogo-card:hover{
transform:scale(1.08);
}

.catalogo-card p{

text-align:center;

margin-top:10px;

font-size:15px;

}

/* FLECHAS */

.flecha{

position:absolute;

top:50%;

transform:translateY(-50%);

font-size:40px;

color:white;

cursor:pointer;

padding:10px;

z-index:10;

}

.flecha:hover{
transform:translateY(-50%) scale(1.2);
}

.flecha.izq{
left:10px;
}

.flecha.der{
right:10px;
}

</style>

</head>

<body>

<!-- WHATSAPP -->

<a class="link whatsapp"
href="https://wa.me/50433661836?text=Hola,%20¿me%20podría%20brindar%20más%20información%20sobre%20sus%20servicios%20digitales?"
target="_blank"></a>


<!-- VER CATÁLOGOS -->

<a class="link catalogo"
onclick="abrirCatalogos()"></a>


<!-- CORREO -->

<a class="link correo"
href="mailto:acezdigita@gmail.com"></a>



<!-- PANEL DE CATÁLOGOS -->

<div id="panelCatalogos">

<div class="cerrar" onclick="cerrarCatalogos()">✕</div>

<div class="tituloCatalogos">
Catálogos Digitales
</div>


<!-- FLECHAS -->

<div class="flecha izq" onclick="moverCatalogo(-300)">❮</div>
<div class="flecha der" onclick="moverCatalogo(300)">❯</div>


<div class="catalogos" id="contenedorCatalogos">


<!-- SIGUA STICKERS -->

<a class="catalogo-card"
href="https://acezdigital.github.io/catalogos/siguastickers/">

<img src="catalogos/siguastickers/1Cel.webp">

<p>Sigua Stickers</p>

</a>


<!-- HOMBRES DE VALOR -->

<a class="catalogo-card"
href="https://acezdigital.github.io/catalogos/hombresdevalor/">

<img src="catalogos/hombresdevalor/1.webp">

<p>Hombres de Valor</p>

</a>


</div>

</div>



<script>

const panel=document.getElementById("panelCatalogos");

function abrirCatalogos(){

panel.classList.add("activo");

}

function cerrarCatalogos(){

panel.classList.remove("activo");

}


/* SCROLL CARRUSEL */

function moverCatalogo(valor){

document.getElementById("contenedorCatalogos").scrollBy({
left:valor,
behavior:"smooth"
});

}


/* CERRAR CON ESC */

document.addEventListener("keydown",function(e){

if(e.key==="Escape"){
cerrarCatalogos();
}

});


/* CERRAR CLIC FUERA */

panel.addEventListener("click",function(e){

if(e.target===panel){
cerrarCatalogos();
}

});

</script>


</body>

</html>
