<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACES Digital</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    header {
      padding: 60px 20px 40px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      opacity: 0.9;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 14px 30px;
      background: #22c55e;
      color: white;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
    }

    .visor {
      margin-top: 40px;
      width: 95%;
      max-width: 900px;
      height: 800px;
      border: none;
      border-radius: 15px;
    }

  </style>
</head>

<body>

  <header>
    <h1>Impulsamos tu negocio al mundo digital</h1>
    <p>Diseños web, marketing, anuncios y presencia online para emprendedores</p>

    <a class="btn" href="#catalogo">Ver catálogo</a>
  </header>

  <!-- SECCIÓN DEL VISOR -->
  <section id="catalogo">

   <!-- VISOR TIPO REVISTA -->
<div id="visor" style="max-width:900px; margin:40px auto; text-align:center;">
  <canvas id="pdf-canvas" style="width:100%; border-radius:12px;"></canvas>

  <div style="margin-top:15px;">
    <button onclick="prevPage()" class="btn">⬅ Anterior</button>
    <span id="page-num"></span> / <span id="page-count"></span>
    <button onclick="nextPage()" class="btn">Siguiente ➡</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<script>
const url = "https://acezdigital.github.io/catalogos/SiguaStickers.pdf";

let pdfDoc = null,
    pageNum = 1,
    pageRendering = false,
    canvas = document.getElementById('pdf-canvas'),
    ctx = canvas.getContext('2d');

pdfjsLib.getDocument(url).promise.then(function(pdfDoc_) {
  pdfDoc = pdfDoc_;
  document.getElementById('page-count').textContent = pdfDoc.numPages;
  renderPage(pageNum);
});

function renderPage(num) {
  pageRendering = true;
  pdfDoc.getPage(num).then(function(page) {
    let viewport = page.getViewport({scale:1.5});
    canvas.height = viewport.height;
    canvas.width = viewport.width;

    let renderContext = {
      canvasContext: ctx,
      viewport: viewport
    };
    page.render(renderContext).promise.then(function() {
      pageRendering = false;
    });

    document.getElementById('page-num').textContent = num;
  });
}

function prevPage() {
  if (pageNum <= 1) return;
  pageNum--;
  renderPage(pageNum);
}

function nextPage() {
  if (pageNum >= pdfDoc.numPages) return;
  pageNum++;
  renderPage(pageNum);
}
</script>
