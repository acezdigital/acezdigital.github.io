<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Siguatepeque</title>

<style>

/* GENERAL */

html,body{
margin:0;
height:100%;
font-family:Arial, Helvetica, sans-serif;
background:url("../Fondoweb.webp") center center / cover no-repeat fixed;
overflow:hidden;
}

/* BOTON MENU FLOTANTE */

.menu-btn{
position:absolute;
top:120px;
left:15px;
font-size:26px;
color:white;
cursor:pointer;
z-index:2000;
background:rgba(0,0,0,0.4);
padding:8px 12px;
border-radius:8px;
}

/* MENU */

.menu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#111827;
transition:0.3s;
padding-top:60px;
z-index:1200;
}

.menu a{
display:block;
color:white;
padding:15px;
text-decoration:none;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.menu a:hover{
background:#1f2937;
}

.menu.active{
left:0;
}

/* VISOR */

#visor{
position:absolute;
top:140px;
bottom:90px;
left:0;
right:0;
display:flex;
justify-content:center;
align-items:center;
touch-action:pan-x;
}

#revista{
width:96%;
max-width:460px;
border-radius:12px;
pointer-events:none;
}

/* INDICADOR */

#indicador{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
color:white;
padding:4px 10px;
border-radius:10px;
font-size:13px;
}

/* FLECHAS */

#flecha-izq,#flecha-der{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:30px;
color:yellow;
background:rgba(0,0,0,0.4);
padding:8px 12px;
border-radius:50%;
cursor:pointer;
}

#flecha-izq{ left:10px; }
#flecha-der{ right:10px; }

/* ZONAS TACTILES */

.whatsapp-touch{
position:absolute;
top:0;
right:0;
width:180px;
height:70px;
}

.correo-touch{
position:absolute;
bottom:0;
right:30px;
width:260px;
height:70px;
}

</style>

</head>


<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">

<a href="../">Inicio</a>
<a href="../historia/">Historia</a>
<a href="../geografia/">Geografía</a>
<a href="../economia/">Economía</a>
<a href="../cultura/">Cultura</a>
<a href="../educacion/">Educación</a>
<a href="../turismo/">Turismo</a>
<a href="../galeria/">Galería</a>
<a href="../informacion/">Información</a>

</div>


<div id="visor">

<img id="revista" src="1.webp">

<div id="indicador">1 / 4</div>

<div id="flecha-izq">&#10094;</div>
<div id="flecha-der">&#10095;</div>

</div>


<a class="whatsapp-touch"
href="https://wa.me/50433661836?text=Hola,%20estoy%20visitando%20el%20Portal%20Digital%20de%20Siguatepeque%20y%20me%20gustaría%20obtener%20más%20información."
target="_blank"></a>

<a class="correo-touch"
href="mailto:acezdigita@gmail.com"></a>


<script>

/* MENU */

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

/* cerrar menu tocando fuera */

document.addEventListener("click", function(event){

const menu = document.getElementById("menu");
const boton = document.querySelector(".menu-btn");

if(
menu.classList.contains("active") &&
!menu.contains(event.target) &&
!boton.contains(event.target)
){
menu.classList.remove("active");
}

});

/* PAGINAS */

const paginas=["1.webp","2.webp","3.webp","4.webp"];

let paginaActual=0;

function mostrar(){
document.getElementById("revista").src=paginas[paginaActual];
document.getElementById("indicador").innerText=(paginaActual+1)+" / "+paginas.length;
}

/* FLECHAS */

document.getElementById("flecha-der").onclick=()=>{
if(paginaActual<paginas.length-1){
paginaActual++;
mostrar();
}
};

document.getElementById("flecha-izq").onclick=()=>{
if(paginaActual>0){
paginaActual--;
mostrar();
}
};

/* SWIPE */

let startX=0;

const visor=document.getElementById("visor");

visor.addEventListener("touchstart",(e)=>{
startX=e.touches[0].clientX;
});

visor.addEventListener("touchend",(e)=>{

let endX=e.changedTouches[0].clientX;
let diff=startX-endX;

if(diff>40){
if(paginaActual<paginas.length-1){
paginaActual++;
mostrar();
}
}

if(diff<-40){
if(paginaActual>0){
paginaActual--;
mostrar();
}
}

});

mostrar();

</script>

</body>
</html>
