<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Siguatepeque</title>

<style>

/* GENERAL */

html,body{
margin:0;
height:100%;
font-family:Arial, Helvetica, sans-serif;
background:url("../Fondoweb.webp") center center / cover no-repeat fixed;
overflow:hidden;
}


/* HEADER */

.header{
position:fixed;
top:0;
width:100%;
height:60px;
background:#2f2f2f;
display:flex;
align-items:center;
padding-left:15px;
border-bottom:2px solid yellow;
z-index:1000;
}

.menu-btn{
font-size:24px;
color:white;
cursor:pointer;
}


/* MENU */

.menu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:#111827;
transition:0.3s;
padding-top:60px;
z-index:1200;
}

.menu a{
display:block;
color:white;
padding:15px;
text-decoration:none;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.menu a:hover{
background:#1f2937;
}

.menu.active{
left:0;
}


/* VISOR */

#visor{
position:absolute;
top:140px;       /* debajo del logo de siguatepeque */
bottom:90px;     /* arriba del correo */
left:0;
right:0;
display:flex;
justify-content:center;
align-items:center;
touch-action:pan-x;
}

#revista{
width:96%;
max-width:460px;
border-radius:12px;
pointer-events:none;
}


/* INDICADOR */

#indicador{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
color:white;
padding:4px 10px;
border-radius:10px;
font-size:13px;
}


/* FLECHAS */

#flecha-izq,#flecha-der{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:30px;
color:yellow;
background:rgba(0,0,0,0.4);
padding:8px 12px;
border-radius:50%;
cursor:pointer;
}

#flecha-izq{ left:10px; }
#flecha-der{ right:10px; }


/* ZONAS TACTILES */

.whatsapp-touch{
position:absolute;
top:0;
right:0;
width:180px;
height:70px;
}

.correo-touch{
position:absolute;
bottom:0;
right:30px;
width:260px;
height:70px;
}

</style>

</head>


<body>


<div class="header">

<span class="menu-btn" onclick="toggleMenu()">☰</span>

</div>



<div class="menu" id="menu">

<a href="../">Inicio</a>
<a href="../historia/">Historia</a>
<a href="../geografia/">Geografía</a>
<a href="../economia/">Economía</a>
<a href="../cultura/">Cultura</a>
<a href="../educacion/">Educación</a>
<a href="../turismo/">Turismo</a>
<a href="../galeria/">Galería</a>
<a href="../informacion/">Información</a>

</div>



<div id="visor">

<img id="revista" src="1.webp">

<div id="indicador">1 / 4</div>

<div id="flecha-izq">&#10094;</div>
<div id="flecha-der">&#10095;</div>

</div>



<a class="whatsapp-touch"
href="https://wa.me/50433661836?text=Hola,%20quisiera%20información"
target="_blank"></a>


<a class="correo-touch"
href="mailto:aceezdigitar@gmail.com"></a>



<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

const paginas=["1.webp","2.webp","3.webp","4.webp"];

let paginaActual=0;

function mostrar(){
document.getElementById("revista").src=paginas[paginaActual];
document.getElementById("indicador").innerText=(paginaActual+1)+" / "+paginas.length;
}

document.getElementById("flecha-der").onclick=()=>{
if(paginaActual<paginas.length-1){
paginaActual++;
mostrar();
}
};

document.getElementById("flecha-izq").onclick=()=>{
if(paginaActual>0){
paginaActual--;
mostrar();
}
};

mostrar();

</script>

</body>
</html>
