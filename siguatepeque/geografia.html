<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Siguatepeque | ACEZ Digital</title>

<style>

body{
margin:0;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;

/* FONDO GLOBAL */

background-image:url("FondoWeb.webp");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* CONTENEDOR */

.portal{
position:relative;
height:95vh;
max-width:900px;
}

/* IMAGEN CENTRAL */

.portal img{
height:100%;
display:block;
}

/* CONTENIDO */

.contenido{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:70%;

background:rgba(255,255,255,0.95);

padding:40px;

border-radius:12px;

box-shadow:0 10px 30px rgba(0,0,0,0.35);

}

/* TITULOS */

h1{
text-align:center;
color:#0b1c2c;
}

/* TEXTO */

p{
font-size:17px;
line-height:1.7;
color:#222;
}

</style>

</head>

<body>

<div class="portal">

<img src="WebSigua.webp">

<div class="contenido">

<h1>Historia de Siguatepeque</h1>

<p>
Aquí puedes colocar el contenido de esta sección del portal de Siguatepeque.
</p>

<p>
Este texto es solo un ejemplo para probar el diseño.
</p>

</div>

</div>

</body>
</html>
