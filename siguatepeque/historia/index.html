<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Siguatepeque</title><style>

/* GENERAL */

html,body{
margin:0;
height:100%;
font-family:Arial, Helvetica, sans-serif;
background:url("../Fondoweb.webp") center center / cover no-repeat fixed;
overflow:hidden;
}

/* BOTON MENU */

.menu-btn{
position:fixed;
top:20px;
left:15px;
font-size:26px;
color:white;
cursor:pointer;
z-index:2000;
background:rgba(0,0,0,0.40);
padding:8px 12px;
border-radius:8px;
backdrop-filter:blur(6px);
}

/* MENU */

.menu{
position:fixed;
top:0;
left:-150px;
width:150px;
height:100%;
background:rgba(17,24,39,0.85); /* transparencia elegante */
backdrop-filter:blur(6px);
transition:left .35s ease;
padding-top:60px;
z-index:1500;
box-shadow:4px 0 14px rgba(0,0,0,0.5);
}

/* ENLACES DEL MENU */

.menu a{
display:block;
color:white;
padding:12px 18px;
text-decoration:none;
border-bottom:1px solid rgba(255,255,255,0.08);
font-size:15px;
letter-spacing:0.3px;
}

.menu a:hover{
background:rgba(255,255,255,0.08);
}

/* MENU ACTIVO */

.menu.active{
left:0;
}

/* OVERLAY OSCURO */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
opacity:0;
pointer-events:none;
transition:.3s;
z-index:1400;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

.overlay.active{
opacity:1;
pointer-events:auto;
}

/* VISOR */

#visor{
position:absolute;
top:120px;
bottom:90px;
left:0;
right:0;
display:flex;
justify-content:center;
align-items:center;
touch-action:pan-x;
}

/* IMAGEN */

#revista{
width:96%;
max-width:460px;
border-radius:12px;
pointer-events:none;
user-select:none;
-webkit-user-drag:none;
transition:opacity .25s ease;
}

/* INDICADOR */

#indicador{
position:absolute;
bottom:12px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.55);
color:white;
padding:5px 12px;
border-radius:12px;
font-size:13px;
letter-spacing:1px;
}

/* FLECHAS */

#flecha-izq,#flecha-der{
position:absolute;
top:80px;
transform:translateY(-50%);
font-size:32px;
color:yellow;
background:rgba(0,0,0,0.35);
padding:16px 20px;
border-radius:50%;
cursor:pointer;
user-select:none;
transition:.2s;
backdrop-filter:blur(4px);
}

#flecha-izq:hover,#flecha-der:hover{
background:rgba(0,0,0,0.6);
}

#flecha-izq{ left:10px; }
#flecha-der{ right:10px; }

/* ZONAS TACTILES */

.whatsapp-touch{
position:absolute;
top:0;
right:0;
width:180px;
height:70px;
z-index:2100;
}

.verweb-touch{
position:absolute;
bottom:0;
right:30px;
width:260px;
height:70px;
z-index:1600;
}

<script>

/* MENU */

function toggleMenu(){

document.getElementById("menu").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");

}

/* cerrar menu tocando fuera */

document.addEventListener("click", function(event){

const menu = document.getElementById("menu");
const boton = document.querySelector(".menu-btn");
const overlay = document.getElementById("overlay");

if(
menu.classList.contains("active") &&
!menu.contains(event.target) &&
!boton.contains(event.target)
){
menu.classList.remove("active");
overlay.classList.remove("active");
}

});

/* PAGINAS */

const paginas=["1.png","2.webp","3.webp","4.webp"];

let paginaActual=0;

function mostrar(){

const img=document.getElementById("revista");

img.style.opacity=0;

setTimeout(()=>{

img.src=paginas[paginaActual];

document.getElementById("indicador").innerText=(paginaActual+1)+" / "+paginas.length;

img.style.opacity=1;

},120);

}

/* FLECHAS */

document.getElementById("flecha-der").onclick=()=>{

if(paginaActual<paginas.length-1){

paginaActual++;

mostrar();

}

};

document.getElementById("flecha-izq").onclick=()=>{

if(paginaActual>0){

paginaActual--;

mostrar();

}

};

/* SWIPE */

let startX=0;

const visor=document.getElementById("visor");

visor.addEventListener("touchstart",(e)=>{

startX=e.touches[0].clientX;

});

visor.addEventListener("touchend",(e)=>{

let endX=e.changedTouches[0].clientX;

let diff=startX-endX;

if(diff>60){

if(paginaActual<paginas.length-1){

paginaActual++;

mostrar();

}

}

if(diff<-60){

if(paginaActual>0){

paginaActual--;

mostrar();

}

}

});

mostrar();

</script></body>
</html>
